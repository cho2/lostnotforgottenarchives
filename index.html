  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #c9a84c; --gold-light: #e8c96b;
      --dark: #0a0a0f; --dark-2: #12121a; --dark-3: #1c1c28;
      --text: #e8e0d0; --text-muted: #8a8070;
      --border: rgba(201,168,76,0.2);
    }
    body { background: var(--dark); color: var(--text); font-family: 'Crimson Pro', Georgia, serif; font-size: 17px; line-height: 1.7; }

    /* HEADER */
    header { text-align: center; padding: 3rem 2rem 2.5rem; background: radial-gradient(ellipse at top, rgba(201,168,76,0.08) 0%, transparent 70%); border-bottom: 1px solid var(--border); }
    .header-inner { display: flex; flex-direction: column; align-items: center; gap: 1.2rem; }
    .header-logos { display: flex; align-items: center; justify-content: center; gap: 2.5rem; flex-wrap: wrap; }
    .site-title { font-family: 'Cinzel', serif; font-size: clamp(1rem,2.5vw,1.5rem); font-weight: 400; letter-spacing: .25em; color: var(--text-muted); text-transform: uppercase; margin-top: .3rem; }

    /* Logo & stamp effects */
    .logo-wrap {
      position: relative;
      display: inline-block;
      padding: 0 clamp(45px, 11vw, 80px) clamp(28px, 7vw, 50px) 0;
      line-height: 0;
      max-width: calc(100vw - 4rem);
    }

    .dt-logo {
      height: auto;
      width: clamp(140px, 38vw, 280px);
      max-width: 100%;
      opacity: 0.90;
      display: block;
    }

    .lnfa-stamp {
      height: clamp(70px, 18vw, 140px);
      width: auto;
      position: absolute;
      bottom: 0;
      right: 0;
      opacity: 0.92;
      transform: rotate(-8deg);
      filter: url(#stamp-grain);
      pointer-events: none;
    }

    @media (min-width: 769px) {
      .logo-wrap {
        padding: 0 80px 50px 0;
        max-width: none;
      }
      .dt-logo {
        width: auto;
        height: 90px;
      }
      .lnfa-stamp {
        height: 140px;
      }
    }

    /* SECTION TITLE */
    .section-title { font-family: 'Cinzel', serif; font-size: clamp(.9rem,2.5vw,1.3rem); font-weight: 400; letter-spacing: .12em; text-transform: uppercase; color: var(--gold); text-align: center; padding: 3rem 2rem 2rem; }
    .section-title span { display: inline-block; padding: 0 1.5rem; background: var(--dark); position: relative; }
    .section-title::after { content: ''; display: block; width: 80%; margin: .5rem auto 0; height: 1px; background: var(--border); }

    /* GRID */
    .releases-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px,1fr)); gap: 1.5px; background: var(--border); padding-bottom: 3rem; }

    /* CARD */
    .card { background: var(--dark-2); padding: 1.8rem 1.5rem 1.5rem; display: flex; flex-direction: column; gap: 1rem; position: relative; transition: background .3s; }
    .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: transparent; transition: background .3s; }
    .card:hover { background: var(--dark-3); }
    .card:hover::before { background: var(--gold); }

    /* BADGE */
    .badge { display: inline-block; font-family: 'Cinzel', serif; font-size: .6rem; font-weight: 700; letter-spacing: .15em; text-transform: uppercase; padding: .25em .8em; border-radius: 2px; align-self: flex-start; }
    .demo   { background: rgba(201,76,76,.15);  color: #f08080; border: 1px solid rgba(201,76,76,.35); }
    .live   { background: rgba(201,168,76,.12); color: var(--gold-light); border: 1px solid rgba(201,168,76,.3); }
    .studio { background: rgba(76,156,106,.12); color: #80d4a0; border: 1px solid rgba(76,156,106,.3); }
    .cover  { background: rgba(76,124,201,.12); color: #80a8f0; border: 1px solid rgba(76,124,201,.3); }

    .card-title { font-family: 'Cinzel', serif; font-size: .88rem; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; color: var(--text); line-height: 1.4; }

    /* RELEASES ROW */
    .releases-row { display: flex; gap: 1rem; flex-wrap: wrap; }
    .release-item { flex: 1; min-width: 110px; display: flex; flex-direction: column; align-items: center; gap: .4rem; }
    .release-item img { width: 100%; max-width: 140px; aspect-ratio: 1; object-fit: cover; border: 1px solid var(--border); transition: border-color .3s, transform .3s; cursor: zoom-in; }
    .card:hover .release-item img { border-color: var(--gold); transform: scale(1.02); }
    .release-label { font-family: 'Cinzel', serif; font-size: .62rem; letter-spacing: .1em; color: var(--gold); text-transform: uppercase; text-align: center; }
    .release-sub { font-size: .7rem; color: var(--text-muted); text-align: center; line-height: 1.6; }
    .na-tag { font-size: .8rem; color: var(--text-muted); font-style: italic; padding: .5rem 0; }

    /* SPOTIFY */
    .spotify-wrap { border-radius: 8px; overflow: hidden; background: #000; }
    .spotify-wrap iframe { width: 100%; height: 80px; border: none; display: block; }

    /* FOOTER */
    footer { border-top: 1px solid var(--border); padding: 2.5rem 2rem; text-align: center; }
    .footer-label { font-family: 'Cinzel', serif; font-size: .65rem; letter-spacing: .15em; text-transform: uppercase; color: var(--text-muted); opacity: .5; margin-bottom: .8rem; }
    .footer-sources { display: flex; flex-wrap: wrap; justify-content: center; gap: .5rem 2rem; margin-bottom: 1.5rem; }
    .footer-playlist { display: flex; justify-content: center; }
    footer a { font-family: 'Cinzel', serif; font-size: .72rem; letter-spacing: .1em; text-transform: uppercase; color: var(--text-muted); text-decoration: none; transition: color .2s; }
    footer a:hover { color: var(--gold-light); }
    .playlist-link { display: inline-block; padding: .6em 2em; border: 1px solid var(--border); color: var(--gold) !important; transition: background .2s, border-color .2s; }
    .playlist-link:hover { background: rgba(201,168,76,.08) !important; border-color: var(--gold) !important; }
    .footer-credit { margin-top: 1.8rem; font-family: 'Cinzel', serif; font-size: .6rem; letter-spacing: .2em; text-transform: uppercase; color: var(--text-muted); opacity: .35; }

    /* MODAL */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.88); z-index: 9999; align-items: center; justify-content: center; padding: 1.5rem; backdrop-filter: blur(8px); }
    .modal-overlay.active { display: flex; }
    .modal-box { position: relative; max-width: 500px; width: 100%; animation: fadeUp .22s ease; }
    .modal-box img { width: 100%; display: block; border: 1px solid var(--border); box-shadow: 0 0 80px rgba(201,168,76,.12); }
    .modal-caption { font-family: 'Cinzel', serif; font-size: .68rem; letter-spacing: .12em; text-transform: uppercase; color: var(--gold); text-align: center; margin-top: .8rem; }
    .modal-caption .modal-id { display: block; margin-bottom: .2rem; }
    .modal-caption .modal-title { display: block; font-family: 'Crimson Pro', serif; font-size: 1rem; letter-spacing: 0; text-transform: none; color: var(--text); margin-bottom: .5rem; }
    .modal-caption .modal-labels { display: block; font-family: 'Crimson Pro', serif; font-size: .8rem; letter-spacing: 0; text-transform: none; color: var(--text-muted); line-height: 1.7; }
    .modal-close { position: absolute; top: -1rem; right: -1rem; width: 2rem; height: 2rem; background: var(--dark-3); border: 1px solid var(--border); color: var(--gold); font-size: .9rem; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 2px; transition: background .2s; }
    .modal-close:hover { background: var(--dark); }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  </style>

// ═══════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════
const catLabel = { demo:'Demo', live:'Live', studio:'Studio', cover:'Cover' };

function badge(cat) {
  return `<span class="badge ${cat}">${catLabel[cat]}</span>`;
}

function releaseItem(rel, title) {
  const safeTitle  = title.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  const safeSrc    = rel.img.replace(/'/g,"\\'");
  const safeLabels = rel.labels.join('||').replace(/'/g,"\\'");
  return `
    <div class="release-item">
      <img src="${rel.img}" alt="${rel.id}" title="Klik untuk perbesar"
           onclick="openModal('${safeSrc}','${rel.id}','${safeTitle}','${safeLabels}')">
      <div class="release-label">${rel.id}</div>
      <div class="release-sub">${rel.labels.map(l=>`<span>${l}</span>`).join('<br>')}</div>
    </div>`;
}

function spotifyEmbed(url) {
  return url
    ? `<div class="spotify-wrap"><iframe src="${url}" allowfullscreen
         allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
         loading="lazy"></iframe></div>`
    : '';
}

function card(data, showBoth) {
  const right = showBoth
    ? (data.lnfa ? releaseItem(data.lnfa, data.title) : `<div class="release-item"><div class="na-tag">No official reissue</div></div>`)
    : '';
  return `
    <div class="card">
      ${badge(data.category)}
      <div class="card-title">${data.title}</div>
      <div class="releases-row">
        ${releaseItem(showBoth ? data.ytse : data.lnfa, data.title)}
        ${right}
      </div>
      ${spotifyEmbed(data.spotify)}
    </div>`;
}

// ═══════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════
document.getElementById('app').innerHTML = `
  <div class="section-title"><span>Ytse Jam Records · Remixed, Remastered &amp; Reissued</span></div>
  <div class="releases-grid">${reissues.map(r => card(r, true)).join('')}</div>
  <div class="section-title"><span>Lost Not Forgotten Archives · Previously Unreleased</span></div>
  <div class="releases-grid">${newReleases.map(r => card(r, false)).join('')}</div>
`;

// ═══════════════════════════════════════════════════════
//  MODAL
// ═══════════════════════════════════════════════════════
function openModal(src, id, title, labelsStr) {
  document.getElementById('modalImg').src = src;
  const labels = labelsStr.split('||').map(l => `<span>${l}</span>`).join('<br>');
  document.getElementById('modalCaption').innerHTML =
    `<span class="modal-id">${id}</span>
     <span class="modal-title">${title}</span>
     <span class="modal-labels">${labels}</span>`;
  document.getElementById('imgModal').classList.add('active');
}

function closeModal(e) {
  if (e.target === document.getElementById('imgModal'))
    document.getElementById('imgModal').classList.remove('active');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape')
    document.getElementById('imgModal').classList.remove('active');
});
</script>
